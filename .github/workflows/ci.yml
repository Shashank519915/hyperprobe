name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - chore/repo-scaffold
      - feat/**
      - test/**

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: |
          mkdir -p tests
          pytest tests/ -q || { code=$?; if [ "$code" -eq 5 ]; then exit 0; fi; exit "$code"; }

      - name: Check target purity
        run: bash scripts/check_target_purity.sh
